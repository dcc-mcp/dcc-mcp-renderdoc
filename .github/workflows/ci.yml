name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, "release-please--branches--**"]
  schedule:
    - cron: "23 3 * * 1"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.9", "3.12"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install -e ".[dev]"
      - run: python -m pytest

  lint-build:
    name: Lint, skill contracts, and package build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install -e ".[dev]"
      - run: ruff check src tests tools
      - run: ruff format --check src tests tools
      - run: python tools/lint_skills.py
      - run: python -m build
      - run: python -m twine check dist/*

  renderdoc-latest:
    name: Latest stable RenderDoc / real OpenGL capture smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DCC_MCP_LOG_LEVEL: WARN
      DCC_MCP_DISABLE_FILE_LOGGING: "1"
      DCC_MCP_DISABLE_JOB_PERSISTENCE: "1"
      DCC_MCP_DISABLE_TELEMETRY: "1"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install -e ".[dev]"
      - run: sudo apt-get update && sudo apt-get install -y libgl1-mesa-dev libproxy1v5 libx11-dev xvfb
      - id: renderdoc
        shell: bash
        run: echo "path=$(python tools/download_latest_renderdoc.py --output .renderdoc-bin)" >> "$GITHUB_OUTPUT"
      - name: Verify qrenderdoc runtime dependencies
        shell: bash
        run: |
          qrenderdoc="$(dirname "${{ steps.renderdoc.outputs.path }}")/qrenderdoc"
          missing="$(ldd "$qrenderdoc" | grep 'not found' || true)"
          if [[ -n "$missing" ]]; then
            echo "$missing"
            exit 1
          fi
      - name: Compile OpenGL capture target
        shell: bash
        run: |
          header=$(find .renderdoc-bin -name renderdoc_app.h -print -quit)
          cc tests/renderdoc_smoke.c -I"$(dirname "$header")" -lX11 -lGL -ldl -o tests/renderdoc_smoke
      - name: Capture and analyze a real frame
        shell: bash
        env:
          QT_QPA_PLATFORM: xcb
        run: xvfb-run -a python tests/live_renderdoc_smoke.py --renderdoc "${{ steps.renderdoc.outputs.path }}" --program tests/renderdoc_smoke
      - uses: actions/upload-artifact@v6
        if: always()
        with:
          name: renderdoc-smoke
          path: artifacts/
          if-no-files-found: warn

